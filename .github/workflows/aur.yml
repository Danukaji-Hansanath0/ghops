name: Publish AUR
on:
  workflow_dispatch:
  push:
    branches: [master]
    paths: [PKGBUILD, .SRCINFO, ghops.install]

jobs:
  aur:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Push to AUR
        env:
          AUR_SSH_KEY: ${{ secrets.AUR_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$AUR_SSH_KEY" > ~/.ssh/aur
          chmod 600 ~/.ssh/aur
          cat >> ~/.ssh/config <<EOF
          Host aur.archlinux.org
            IdentityFile ~/.ssh/aur
            User aur
            StrictHostKeyChecking no
          EOF

          git clone ssh://aur@aur.archlinux.org/ghops.git /tmp/aur
          cp PKGBUILD .SRCINFO ghops.install /tmp/aur/
          cd /tmp/aur
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add -A
          git diff --staged --quiet || git commit -m "AUR update $(date +%Y-%m-%d)"
          git push
