name: Build
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Shellcheck
        run: |
          sudo apt install -y shellcheck
          shellcheck bin/ghops

  deb:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build .deb
        run: |
          sudo apt update && sudo apt install -y build-essential devscripts debhelper
          dpkg-buildpackage -us -uc -b
          mkdir -p artifacts
          mv ../ghops_*.deb artifacts/
      - uses: actions/upload-artifact@v4
        with:
          name: deb-package
          path: artifacts/

  rpm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build .rpm
        run: |
          sudo apt update && sudo apt install -y rpm
          mkdir -p ~/rpmbuild/{SPECS,SOURCES}
          VERSION="1.0.0"
          sed "s/VER/${VERSION}/" packaging/ghops.spec > ~/rpmbuild/SPECS/ghops.spec
          tar czf ~/rpmbuild/SOURCES/ghops.tar.gz --transform="s/^ghops/ghops-${VERSION}/" ghops/
          rpmbuild -ba ~/rpmbuild/SPECS/ghops.spec
          mkdir -p artifacts
          cp ~/rpmbuild/RPMS/noarch/*.rpm artifacts/ 2>/dev/null || true
      - uses: actions/upload-artifact@v4
        with:
          name: rpm-package
          path: artifacts/

  arch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build .pkg.tar.zst
        uses: docker://archlinux:latest
        with:
          entrypoint: /bin/bash
          args: |
            pacman -Sy --noconfirm base-devel sudo
            useradd -m builder && echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
            chown -R builder:builder /github/workspace
            su builder -c "cd /github/workspace && makepkg -f"
            mkdir -p artifacts && cp *.pkg.tar.zst artifacts/
      - uses: actions/upload-artifact@v4
        with:
          name: arch-package
          path: artifacts/
